name: Node-kontroll (panik-overlay)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  check:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: panik-overlay

    strategy:
      matrix:
        node-version: [20.x]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: panik-overlay/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Check app structure
        run: npm run check
